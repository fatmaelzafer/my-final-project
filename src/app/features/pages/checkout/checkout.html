<div class="container-custom py-10 max-w-md ">



</div>
<div class="min-h-screen flex items-center justify-center bg-lightGray">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-xl font-bold mb-4">
            Shipping Address
        </h2>

        <form [formGroup]="form" (ngSubmit)="submit()">

            <input formControlName="details" placeholder="Address details" class="w-full border p-2 rounded mb-3">

            <input formControlName="phone" placeholder="Phone" class="w-full border p-2 rounded mb-3">

            <input formControlName="city" placeholder="City" class="w-full border p-2 rounded mb-3">

            <button class="w-full bg-green-500 py-2 rounded">

                {{ loading() ? 'Processing...' : 'Pay Now' }}

            </button>

        </form>
    </div>

</div>
