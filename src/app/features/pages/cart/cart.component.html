<div class="container-custom py-8">

  <h2 class="text-2xl font-semibold mb-6">
    Shopping Cart
  </h2>

  <div class="bg-lightGray p-6 rounded-lg">
    @for (item of cart().products; track $index) {
    <div class="flex items-center justify-between border-b py-4">

      <img [src]="item.product.imageCover" class="w-20 h-20 object-cover rounded">

      <h3 class="w-60 text-sm font-medium">
        {{ item.product.title }}
      </h3>

      <div class="flex items-center gap-3">

        <button (click)="update(item.product._id, item.count - 1)" class="border px-2 rounded">
          -
        </button>

        <span>
          {{ item.count }}
        </span>

        <button (click)="update(item.product._id, item.count + 1)" class="border px-2 rounded">
          +
        </button>

      </div>

      
      <span class="text-primary font-bold">
        {{ item.price }} EGP
      </span>

      <button (click)="remove(item.product._id)" class="text-red-500 text-sm hover:underline">
        Remove
      </button>

    </div>

    }


    <div class="flex justify-between items-center mt-6">

      <button (click)="clear()" class="text-red-500">
        Clear Cart
      </button>

      <span class="text-xl font-bold text-primary">
        Total: {{ cart().totalCartPrice }} EGP
      </span>
      <button (click)="goToCheckout()" class="bg-red-400 text-white px-6 py-2 rounded mt-4">

        Checkout

      </button>

    </div>

  </div>

</div>
