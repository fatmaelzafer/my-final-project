<section 
  class="max-w-7xl mx-auto px-4 py-12 grid grid-cols-1 md:grid-cols-2 gap-10">

  <img [src]="product()?.imageCover"class="rounded-xl w-full h-[500px] object-cover">

  <div>
    <h1 class="text-4xl font-bold mb-4">{{product()?.title}} </h1>
    <p class=" mb-6">{{product()?.description}}</p>

    <div class="text-2xl font-semibold mb-6">
      ${{product()?.price}}
    </div>

    <button
      click=""
      class="bg-blue-500 text-white-100 px-8 py-3 rounded-lg hover:bg-accent transition">
      Add to Cart
    </button>
  </div>

</section>
