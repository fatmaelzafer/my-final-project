<div class="group border rounded-xl overflow-hidden hover:shadow-xl transition">
    <div class="relative">
        <img [src]="p.imageCover" class=" w-full object-cover group-hover:scale-105 transition" alt="">
    </div>
    
    <div class="p-4">
        <h3 class="font-semibold text-lg line-clamp-1"> {{p.title }}</h3>
        <p class="text-gray-500 text-sm"> {{p.category}} </p>

        <div class="flex justify-between items-center mt-4">
            <span class="font-bold"> {{p.price|currency:'EGP'}} </span>
            
            <a class="text-sm text-accent hover:underline" [routerLink]="['/products-details', p._id]" >
                View
            </a>
        </div>
        <button
    (click)="addToCart(p._id)"
    [disabled]="loadingProduct === p._id"
    class="w-full mt-3 bg-primary text-white py-2 rounded hover:bg-green-700 transition">

    <span >
      Add To Cart
    </span>

    

  </button>
    </div>
</div>
